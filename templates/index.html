<!DOCTYPE html>
<html>

<head>

    <title>Toxicity Detector</title>

    <style>

        body{
            font-family: Arial;
            background:#f5f5f5;
            padding:40px;
        }

        .container{
            width:500px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
        }

        textarea{
            width:100%;
            height:120px;
            padding:10px;
            font-size:16px;
        }

        button{
            margin-top:20px;
            padding:10px 20px;
            cursor:pointer;
        }

        .result{
            margin-top:30px;
            background:#eeeeee;
            padding:15px;
            border-radius:8px;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Toxicity Detection System</h2>

    <form action="/predict-ui" method="post">

        <textarea
            name="text"
            placeholder="Enter comment..."
        ></textarea>

        <br>

        <button type="submit">
            Check Toxicity
        </button>

    </form>

    {% if prediction %}

    <div class="result">

        <h3>Result</h3>

        <p>
            <b>Prediction:</b>
            {{ prediction }}
        </p>

        <p>
            <b>Confidence:</b>
            {{ confidence }}%
        </p>

        <p>
            <b>Masked Text:</b>
            {{ masked_text }}
        </p>

    </div>

    {% endif %}

</div>

</body>

</html>
